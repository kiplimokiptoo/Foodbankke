<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBankKe - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="main-nav">
        <ul class="nav-list">
            <li><a href="home.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contributions.html">Contributions</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="contact-box">
            <h1>Contact Us</h1>
            <p>Feel free to reach out to us with any questions or feedback!</p>
            <div class="contact-details">
                <h2>Email: foodbankke@gmail.com</h2>
                <p>Phone: 0712897654</p>
                <p>Instagram: foodbankke</p>
                <p>Facebook: FoodBank Kenya</p>
            </div>

            <form class="feedback-form" action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name here">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email here">

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message here"></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 FoodBankKe. All rights reserved.</p>
    </footer>
</body>
</html>
